name: Build and release

on:
  workflow_dispatch:
    inputs:
      upload_target:
        description: "分发目标"
        required: true
        type: choice
        default: "telegram-only"
        options:
          - "release-only"
          - "telegram-only"
          - "both"
      tag:
        description: "Release tag / version (x.y.z)"
        required: true
        type: string
      source_repo:
        description: "源仓库 (owner/repo，留空则用当前仓库)"
        required: false
        type: string
        default: "It-s-bilibili-ticket-golang/bilibili-ticket-golang-private"
      source_ref:
        description: "源仓库分支/tag/commit (留空则用默认分支)"
        required: false
        type: string
        default: "main"

permissions:
  contents: write
  actions: write

concurrency:
  group: cross-build-${{ github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate build inputs and secrets
        shell: bash
        env:
          VERSION: ${{ inputs.tag }}
          REPORT_DSN: ${{ secrets.REPORT_DSN }}
          REPORT_PUBLIC_KEY: ${{ secrets.REPORT_PUBLIC_KEY }}
          GARBLE_SEED: ${{ secrets.GARBLE_SEED }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::tag must use the x.y.z format (for example: 1.2.3)"
            exit 1
          fi

          if [ -z "$REPORT_DSN" ]; then
            echo "::error::GitHub secret ReportDSN is required"
            exit 1
          fi

          if [ -z "$REPORT_PUBLIC_KEY" ]; then
            echo "::error::GitHub secret REPORT_PUBLIC_KEY is required"
            exit 1
          fi

          if [ -z "$GARBLE_SEED" ]; then
            echo "::error::GitHub secret GarbleSeed is required"
            exit 1
          fi

          python3 - <<'PY'
          import base64
          import os
          import sys

          value = os.environ["GARBLE_SEED"]
          try:
              seed = base64.b64decode(value + "=" * (-len(value) % 4), validate=True)
          except ValueError as error:
              print(f"::error::GarbleSeed must be valid standard Base64: {error}")
              sys.exit(1)
          if len(seed) < 8:
              print("::error::GarbleSeed must decode to at least 8 bytes")
              sys.exit(1)

          try:
              public_key = base64.b64decode(os.environ["REPORT_PUBLIC_KEY"] + "=" * (-len(os.environ["REPORT_PUBLIC_KEY"]) % 4), validate=True)
          except ValueError as error:
              print(f"::error::REPORT_PUBLIC_KEY must be valid standard Base64: {error}")
              sys.exit(1)
          if len(public_key) != 32:
              print("::error::REPORT_PUBLIC_KEY must decode to a 32-byte Ed25519 public key")
              sys.exit(1)
          PY

  build:
    needs: validate
    env:
      GOGARBLE: "bilibili-ticket-golang/*"
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: windows
            arch: amd64
            os: windows-latest
            ext: .exe
            goos: windows
            cgo: 0
          - platform: windows
            arch: arm64
            os: windows-11-arm
            ext: .exe
            goos: windows
            cgo: 0
          - platform: linux
            arch: amd64
            os: ubuntu-26.04
            ext: ""
            goos: linux
            cgo: 1
          - platform: linux
            arch: arm64
            os: ubuntu-26.04-arm
            ext: ""
            goos: linux
            cgo: 1
          - platform: darwin
            arch: amd64
            os: macos-26-intel
            ext: ""
            goos: darwin
            cgo: 1
          - platform: darwin
            arch: arm64
            os: macos-26
            ext: ""
            goos: darwin
            cgo: 1
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set build time
        id: vars
        shell: bash
        run: |
          echo "build_time=$(date -u +%Y%m%dT%H%M%S)" >> "$GITHUB_OUTPUT"

      # ── Cross-repo checkout ──
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo || github.repository }}
          ref: ${{ inputs.source_ref || '' }}
          token: ${{ secrets.CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve short commit
        id: set_commit
        shell: bash
        run: |
          SHORT="$(git rev-parse --short=7 HEAD)"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Verify fail-closed cloud-control wiring
        shell: bash
        run: |
          test -f process/controller.go
          test -f lib/cloudcontrol/cloudcontrol.go
          ! grep -R "global.ReportSalt\|NewConfiguredReportClient" --include='*.go' cmd process lib
          ! grep -R "NewNoopReportClient" --include='*.go' cmd

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cmd/gui/frontend/package-lock.json

      - name: Resolve Go cache paths
        id: go-cache-paths
        shell: bash
        run: |
          echo "gomod=$(go env GOMODCACHE)" >> "$GITHUB_OUTPUT"
          echo "gobuild=$(go env GOCACHE)" >> "$GITHUB_OUTPUT"
          echo "garble=${RUNNER_TEMP}/garble-cache" >> "$GITHUB_OUTPUT"
          echo "GARBLE_CACHE=${RUNNER_TEMP}/garble-cache" >> "$GITHUB_ENV"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.go-cache-paths.outputs.gomod }}
          key: go-mod-v1-${{ runner.os }}-go1.26-${{ hashFiles('go.work.sum', '**/go.sum') }}
          restore-keys: |
            go-mod-v1-${{ runner.os }}-go1.26-

      - name: Cache Go and Garble build outputs
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.go-cache-paths.outputs.gobuild }}
            ${{ steps.go-cache-paths.outputs.garble }}
          key: go-garble-v2-${{ runner.os }}-${{ matrix.arch }}-go1.26-${{ hashFiles('go.work.sum', '**/go.sum') }}-${{ steps.set_commit.outputs.short }}
          restore-keys: |
            go-garble-v2-${{ runner.os }}-${{ matrix.arch }}-go1.26-${{ hashFiles('go.work.sum', '**/go.sum') }}-
            go-garble-v2-${{ runner.os }}-${{ matrix.arch }}-go1.26-

      - name: Cache Wails frontend build
        uses: actions/cache@v4
        with:
          path: |
            cmd/gui/frontend/node_modules
            cmd/gui/frontend/dist
            cmd/gui/frontend/bindings
            cmd/gui/.task
          key: wails-frontend-v1-${{ runner.os }}-${{ matrix.arch }}-node24-${{ hashFiles('cmd/gui/frontend/package-lock.json') }}-${{ steps.set_commit.outputs.short }}
          restore-keys: |
            wails-frontend-v1-${{ runner.os }}-${{ matrix.arch }}-node24-${{ hashFiles('cmd/gui/frontend/package-lock.json') }}-
            wails-frontend-v1-${{ runner.os }}-${{ matrix.arch }}-node24-

      # ── Linux: install Wails3 GUI build dependencies ──
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-4-dev \
            libwebkitgtk-6.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      # ── Install Wails v3 and Garble CLIs ──
      - name: Install build CLIs
        shell: bash
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          go install mvdan.cc/garble@v0.16.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # ── Anti-scalper prompt skip (CI only) ──
      - name: Skip anti-scalper prompt
        shell: bash
        run: |
          mkdir -p data
          echo "1" > data/.privacy-tos-v1.accepted
          echo "1" > data/.verified

      # ── Build obfuscated GUI through Wails3 ──
      - name: Build obfuscated GUI binary
        shell: bash
        working-directory: cmd/gui
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: ${{ matrix.cgo }}
          VERSION: ${{ inputs.tag }}
          REPORT_DSN: ${{ secrets.REPORT_DSN }}
          REPORT_PUBLIC_KEY: ${{ secrets.REPORT_PUBLIC_KEY }}
          GARBLE_SEED: ${{ secrets.GARBLE_SEED }}
        run: |
          COMMIT="${{ steps.set_commit.outputs.short }}"
          BUILD_TIME="${{ steps.vars.outputs.build_time }}"
          EXTRA_TAGS="production,desktop"
          EXTRA_LDFLAGS="-X bilibili-ticket-golang/lib/global.GitCommit=${COMMIT}"

          case "${{ matrix.platform }}" in
            linux)
              EXTRA_TAGS="$EXTRA_TAGS,webkit2_41"
              ;;
          esac

          EXTRA_LDFLAGS="$EXTRA_LDFLAGS -X bilibili-ticket-golang/lib/global.BuildTime=${BUILD_TIME}"
          EXTRA_LDFLAGS="$EXTRA_LDFLAGS -X 'bilibili-ticket-golang/lib/global.Version=${VERSION}'"
          EXTRA_LDFLAGS="$EXTRA_LDFLAGS -X 'bilibili-ticket-golang/lib/global.ReportDSN=${REPORT_DSN}'"
          EXTRA_LDFLAGS="$EXTRA_LDFLAGS -X 'bilibili-ticket-golang/lib/global.ReportPublicKey=${REPORT_PUBLIC_KEY}'"

          echo "::group::Build info"
          echo "  Platform: ${{ matrix.platform }} (${{ matrix.arch }})"
          echo "  GOOS:     $GOOS"
          echo "  GOARCH:   $GOARCH"
          echo "  CGO:      $CGO_ENABLED"
          echo "  Tags:     $EXTRA_TAGS"
          echo "  Version:  $VERSION"
          echo "  Output:   cmd/gui/bin/bilibili-ticket-golang${{ matrix.ext }}"
          echo "::endgroup::"

          wails3 build \
            -obfuscated \
            -garbleargs "-literals -tiny -seed=${GARBLE_SEED}" \
            -tags "$EXTRA_TAGS" \
            ARCH="${{ matrix.arch }}" \
            EXTRA_LDFLAGS="$EXTRA_LDFLAGS"

      # ── Build ticket worker ──
      - name: Build ticket worker
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
          VERSION: ${{ inputs.tag }}
          REPORT_DSN: ${{ secrets.REPORT_DSN }}
          REPORT_PUBLIC_KEY: ${{ secrets.REPORT_PUBLIC_KEY }}
          GARBLE_SEED: ${{ secrets.GARBLE_SEED }}
        run: |
          COMMIT="${{ steps.set_commit.outputs.short }}"
          BUILD_TIME="${{ steps.vars.outputs.build_time }}"
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X bilibili-ticket-golang/lib/global.GitCommit=${COMMIT}"
          LDFLAGS="$LDFLAGS -X bilibili-ticket-golang/lib/global.BuildTime=${BUILD_TIME}"
          LDFLAGS="$LDFLAGS -X 'bilibili-ticket-golang/lib/global.Version=${VERSION}'"
          LDFLAGS="$LDFLAGS -X 'bilibili-ticket-golang/lib/global.ReportDSN=${REPORT_DSN}'"
          LDFLAGS="$LDFLAGS -X 'bilibili-ticket-golang/lib/global.ReportPublicKey=${REPORT_PUBLIC_KEY}'"
          garble -literals -tiny -seed="$GARBLE_SEED" build \
            -tags production -trimpath -buildvcs=false \
            -ldflags "$LDFLAGS" \
            -o "build/bin/ticket-worker${{ matrix.ext }}" \
            ./cmd/ticket-worker

      # ── Package artifacts ──
      - name: Package artifacts
        shell: bash
        env:
          VERSION: ${{ inputs.tag }}
        run: |
          mkdir -p release
          APP_NAME="bilibili-ticket-golang"
          WORKER_NAME="ticket-worker"

          # Package employer (GUI)
          GUI_SOURCE="cmd/gui/bin/${APP_NAME}${{ matrix.ext }}"
          cp "$GUI_SOURCE" "release/${APP_NAME}${{ matrix.ext }}"
          tar -C release -czf "release/${APP_NAME}_${{ matrix.platform }}_${{ matrix.arch }}_${VERSION}.tar.gz" "${APP_NAME}${{ matrix.ext }}"
          rm -f "release/${APP_NAME}${{ matrix.ext }}"

          # Package worker
          WORKER_SOURCE="build/bin/${WORKER_NAME}${{ matrix.ext }}"
          cp "$WORKER_SOURCE" "release/${WORKER_NAME}${{ matrix.ext }}"
          tar -C release -czf "release/${WORKER_NAME}_${{ matrix.platform }}_${{ matrix.arch }}_${VERSION}.tar.gz" "${WORKER_NAME}${{ matrix.ext }}"
          rm -f "release/${WORKER_NAME}${{ matrix.ext }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cross-build-${{ matrix.platform }}-${{ matrix.arch }}
          path: release/*.tar.gz
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.source_repo || github.repository }}
          ref: ${{ inputs.source_ref || '' }}
          token: ${{ secrets.CHECKOUT_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifact tree
        run: |
          find release-assets -type f -name '*.tar.gz' -exec cp {} release-assets/ \;

      - name: Generate checksums
        env:
          VERSION: ${{ inputs.tag }}
        run: |
          cd release-assets
          sha256sum *.tar.gz > "checksums_${VERSION}.txt"

      # ── Publish to GitHub Release (release-only / both) ──
      - name: Generate release notes
        if: inputs.upload_target == 'release-only' || inputs.upload_target == 'both'
        shell: bash
        env:
          VERSION: ${{ inputs.tag }}
        run: |
          if [ -f .github/release_template.md ]; then
            sed "s|VERSION|${VERSION}|g" .github/release_template.md > release.md
          else
            echo "## Build ${VERSION}" > release.md
          fi

          preTag=$(curl -s "https://api.github.com/repos/${{ github.repository }}/releases/latest" | \
            sed -nE 's/.*"tag_name": "([^\"]+)".*/\1/p')

          if [ -n "$preTag" ] && git rev-parse "$preTag" >/dev/null 2>&1; then
            echo "" >> release.md
            echo "上一版本: $preTag → 当前: $VERSION" >> release.md
            git log --no-merges --pretty=format:"- %s" "$preTag..HEAD" >> release.md
          else
            echo "" >> release.md
            echo "首个发布版本" >> release.md
            git log --no-merges --pretty=format:"- %s" >> release.md
          fi

      - name: Publish GitHub Release
        if: inputs.upload_target == 'release-only' || inputs.upload_target == 'both'
        uses: softprops/action-gh-release@v2
        with:
          token: "${{ secrets.GITHUB_TOKEN }}"
          tag_name: "${{ inputs.tag }}"
          name: "Cross-Build ${{ inputs.tag }}"
          draft: false
          body_path: release.md
          files: |
            release-assets/*.tar.gz
            release-assets/checksums_*.txt

      - name: Cleanup old releases (keep latest 10)
        if: inputs.upload_target == 'release-only' || inputs.upload_target == 'both'
        shell: bash
        run: |
          RELEASES=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName,createdAt --jq 'sort_by(.createdAt) | reverse | .[].tagName')
          COUNT=0
          for TAG in $RELEASES; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt 10 ]; then
              echo "Deleting old release: $TAG"
              gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag
            fi
          done
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      # ── Upload to Telegram (telegram-only / both) ──
      - name: Upload to Telegram
        if: inputs.upload_target == 'telegram-only' || inputs.upload_target == 'both'
        shell: bash
        env:
          VERSION: ${{ inputs.tag }}
        run: |
          REPO="${{ inputs.source_repo || github.repository }}"
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${VERSION}"
          BOT="https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}"
          CHAT_ID="${{ secrets.TELEGRAM_CHAT_ID }}"

          COMMIT_MSG=$(git log -1 --pretty=%B | head -1 | sed 's/[_*[\]()~`>#+\-=|{}.!]/\\\\&/g')

          MSG_HEAD="🚀 *New Build* #beta #release #2026"
          REPO_LINE="📦 *Repo:* \`${REPO}\`"
          BRANCH_LINE="🌿 *Ref:* \`${{ inputs.source_ref || 'default' }}\`"
          TAG_LINE="🔖 *Tag:* \`${VERSION}\`"
          MSG_LINE="📝 ${COMMIT_MSG}"
          LINK_LINE="🔗 [View Release](${RELEASE_URL})"

          TEXT="${MSG_HEAD}%0A%0A${REPO_LINE}%0A${BRANCH_LINE}%0A${TAG_LINE}%0A${MSG_LINE}%0A${LINK_LINE}"

          curl -s -X POST "${BOT}/sendMessage" \
            -d "chat_id=${CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "parse_mode=Markdown" \
            -d "disable_web_page_preview=true"

          # Upload each file to Telegram
          for FILE in release-assets/*.tar.gz; do
            curl -s -X POST "${BOT}/sendDocument" \
              -F "chat_id=${CHAT_ID}" \
              -F "document=@${FILE}"
          done

      # ── Cleanup uploaded artifacts ──
      - name: Delete workflow artifacts
        if: always()
        shell: bash
        run: |
          echo "Cleaning up artifacts for run ${{ github.run_id }}..."
          ARTIFACTS=$(gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" --jq '.artifacts[] | select(.name | startswith("cross-build-")) | .id')
          for ID in $ARTIFACTS; do
            echo "Deleting artifact $ID..."
            gh api --method DELETE "/repos/${{ github.repository }}/actions/artifacts/$ID"
          done
          echo "Artifact cleanup complete."
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
